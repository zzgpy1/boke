# 顶部菜单（对齐原站核心分类）
menu:
  首页: / || fa fa-home
  归档: /archives/ || fa fa-archive
  分类: /categories/ || fa fa-folder-open
  标签: /tags/ || fa fa-tags
  关于: /about/ || fa fa-user

# 基础美化
favicon: ""
avatar: ""

# 加载动画
preloader: true

# 暗黑模式
night_mode:
  enable: true
  default: auto

# 文章目录
toc:
  enable: true
  number: true
  expand: true

# 文章信息
post:
  wordcount: true
  readtime: true
  meta:
    date_type: created

# 侧边栏（复刻原站布局）
aside:
  enable: true
  position: right
  avatar: true
  toc: true
  post_count: true
  categories: true
  tags: true
  tagcloud: true

# 页脚信息
footer:
  owner: 你的昵称
  since: 2026
  information: 守住节奏，慢慢前行，剩下的交给时间

# 全局简约风格
theme_color:
  enable: true
  main: "#49B1F5"
  hover: "#0084FF"

# 取消冗余特效，贴合原站安静风格
canvas_nest: false
ribbon: false
